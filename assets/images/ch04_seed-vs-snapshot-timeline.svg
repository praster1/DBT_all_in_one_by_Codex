<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <rect width="1200" height="680" fill="#111827"/>
  <text x="70" y="70" fill="#f8fafc" font-size="30" font-family="Arial" font-weight="700">Seed vs Snapshot</text>
  <text x="70" y="105" fill="#9ca3af" font-size="18" font-family="Arial">seed는 정적인 기준표, snapshot은 시간이 흐르며 버전이 쌓이는 이력 테이블이다.</text>

  <rect x="90" y="170" width="420" height="360" rx="18" ry="18" fill="#0f766e"/>
  <text x="300" y="220" text-anchor="middle" fill="white" font-size="30" font-family="Arial" font-weight="700">Seed</text>
  <text x="300" y="255" text-anchor="middle" fill="#ccfbf1" font-size="18" font-family="Arial">작고 안정적인 기준표</text>
  <rect x="150" y="300" width="300" height="160" rx="12" ry="12" fill="#134e4a" stroke="#99f6e4" stroke-width="2"/>
  <text x="300" y="340" text-anchor="middle" fill="#ecfeff" font-size="18" font-family="Arial">plan_code | plan_name | list_price</text>
  <text x="300" y="380" text-anchor="middle" fill="#ecfeff" font-size="18" font-family="Arial">FREE | Free | 0</text>
  <text x="300" y="410" text-anchor="middle" fill="#ecfeff" font-size="18" font-family="Arial">PRO_M | Pro Monthly | 29</text>
  <text x="300" y="440" text-anchor="middle" fill="#ecfeff" font-size="18" font-family="Arial">TEAM_M | Team Monthly | 99</text>

  <rect x="650" y="140" width="450" height="420" rx="18" ry="18" fill="#7c3aed"/>
  <text x="875" y="190" text-anchor="middle" fill="white" font-size="30" font-family="Arial" font-weight="700">Snapshot</text>
  <text x="875" y="225" text-anchor="middle" fill="#ede9fe" font-size="18" font-family="Arial">같은 business key의 여러 버전</text>
  <line x1="730" y1="285" x2="1030" y2="285" stroke="#ddd6fe" stroke-width="4"/>
  <circle cx="760" cy="285" r="12" fill="#c4b5fd"/>
  <circle cx="885" cy="285" r="12" fill="#c4b5fd"/>
  <circle cx="1010" cy="285" r="12" fill="#c4b5fd"/>
  <text x="760" y="260" text-anchor="middle" fill="#f5f3ff" font-size="16" font-family="Arial">Day 1</text>
  <text x="885" y="260" text-anchor="middle" fill="#f5f3ff" font-size="16" font-family="Arial">Day 2</text>
  <text x="1010" y="260" text-anchor="middle" fill="#f5f3ff" font-size="16" font-family="Arial">Day 3</text>

  <rect x="730" y="330" width="290" height="55" rx="10" ry="10" fill="#5b21b6" stroke="#ddd6fe" stroke-width="2"/>
  <text x="875" y="365" text-anchor="middle" fill="#f5f3ff" font-size="18" font-family="Arial">order_id = 5003, status = placed</text>

  <rect x="730" y="405" width="290" height="55" rx="10" ry="10" fill="#5b21b6" stroke="#ddd6fe" stroke-width="2"/>
  <text x="875" y="440" text-anchor="middle" fill="#f5f3ff" font-size="18" font-family="Arial">order_id = 5003, status = paid</text>

  <rect x="730" y="480" width="290" height="55" rx="10" ry="10" fill="#5b21b6" stroke="#ddd6fe" stroke-width="2"/>
  <text x="875" y="515" text-anchor="middle" fill="#f5f3ff" font-size="18" font-family="Arial">order_id = 5003, status = cancelled</text>
</svg>
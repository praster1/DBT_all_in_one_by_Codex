<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780">
  <rect width="100%" height="100%" fill="#0b1220"/>
  <text x="70" y="65" fill="#f8fafc" font-size="34" font-family="Arial, sans-serif" font-weight="700">Appendix D · Support Matrix Map</text>
  <text x="70" y="105" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">기능이 있는지보다, 어느 표면에서 가능한지를 먼저 본다.</text>

  <rect x="70" y="150" width="220" height="520" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="110" y="200" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif" font-weight="700">Core CLI</text>
  <text x="95" y="255" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• local docs generate/serve</text>
  <text x="95" y="290" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• packages</text>
  <text x="95" y="325" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• source freshness</text>
  <text x="95" y="360" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• selectors / state / defer</text>
  <text x="95" y="395" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• artifacts</text>
  <text x="95" y="430" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• local semantic query 일부</text>

  <rect x="350" y="150" width="220" height="520" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="400" y="200" fill="#86efac" font-size="28" font-family="Arial, sans-serif" font-weight="700">Fusion</text>
  <text x="375" y="255" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• Fusion CLI</text>
  <text x="375" y="290" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• VS Code extension</text>
  <text x="375" y="325" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• supported-features matrix</text>
  <text x="375" y="360" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• local docs는 제한/변화 가능</text>
  <text x="375" y="395" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• Core manifest와 차이 주의</text>

  <rect x="630" y="150" width="260" height="520" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="670" y="200" fill="#fcd34d" font-size="28" font-family="Arial, sans-serif" font-weight="700">dbt platform</text>
  <text x="660" y="255" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• Studio / Jobs / Catalog</text>
  <text x="660" y="290" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• release tracks</text>
  <text x="660" y="325" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• account/project explore</text>
  <text x="660" y="360" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• CI / state-aware jobs</text>
  <text x="660" y="395" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• semantic APIs/integrations</text>
  <text x="660" y="430" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• plan 차이 큼</text>

  <rect x="950" y="150" width="260" height="520" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="995" y="200" fill="#fda4af" font-size="28" font-family="Arial, sans-serif" font-weight="700">Plan gates</text>
  <text x="980" y="255" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• Semantic Layer: Starter+</text>
  <text x="980" y="290" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• caching: Enterprise 계열</text>
  <text x="980" y="325" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• project dependency: Enterprise+</text>
  <text x="980" y="360" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• multi-project explore: Enterprise 계열</text>
  <text x="980" y="395" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">• rollout 전 문서 재확인 필수</text>

  <path d="M290 410 C320 410, 330 410, 350 410" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M570 410 C600 410, 610 410, 630 410" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M890 410 C920 410, 930 410, 950 410" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#475569"/>
    </marker>
  </defs>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <rect width="100%" height="100%" fill="#0f172a"/>
  <text x="80" y="70" fill="#f8fafc" font-size="34" font-family="Arial, sans-serif" font-weight="700">Appendix D · Decision Surface</text>
  <text x="80" y="110" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">설계 판단은 기능 이름이 아니라 질문 순서로 고른다.</text>

  <g transform="translate(70,170)">
    <rect x="0" y="0" rx="18" ry="18" width="340" height="180" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="24" y="40" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif" font-weight="700">Materialization</text>
    <text x="24" y="82" fill="#e2e8f0" font-size="19" font-family="Arial, sans-serif">view → table → incremental</text>
    <text x="24" y="116" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif">정확한 구조와 테스트가 먼저,</text>
    <text x="24" y="144" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif">incremental은 나중 최적화</text>
  </g>

  <g transform="translate(470,170)">
    <rect x="0" y="0" rx="18" ry="18" width="340" height="180" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="24" y="40" fill="#86efac" font-size="24" font-family="Arial, sans-serif" font-weight="700">State vs History</text>
    <text x="24" y="82" fill="#e2e8f0" font-size="19" font-family="Arial, sans-serif">freshness / snapshot / CDC</text>
    <text x="24" y="116" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif">최근성 확인인가,</text>
    <text x="24" y="144" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif">과거 상태 보존인가를 구분</text>
  </g>

  <g transform="translate(870,170)">
    <rect x="0" y="0" rx="18" ry="18" width="340" height="180" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="24" y="40" fill="#fda4af" font-size="24" font-family="Arial, sans-serif" font-weight="700">Layering</text>
    <text x="24" y="82" fill="#e2e8f0" font-size="19" font-family="Arial, sans-serif">staging / intermediate / mart</text>
    <text x="24" y="116" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif">반복 조인과 fanout 설명이 생기면</text>
    <text x="24" y="144" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif">intermediate 신호</text>
  </g>

  <g transform="translate(70,410)">
    <rect x="0" y="0" rx="18" ry="18" width="340" height="180" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="24" y="40" fill="#67e8f9" font-size="24" font-family="Arial, sans-serif" font-weight="700">Jinja / Macro</text>
    <text x="24" y="82" fill="#e2e8f0" font-size="19" font-family="Arial, sans-serif">helper, run_query, macro</text>
    <text x="24" y="116" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif">반복 제거는 좋지만</text>
    <text x="24" y="144" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif">compiled SQL 가독성이 더 중요</text>
  </g>

  <g transform="translate(470,410)">
    <rect x="0" y="0" rx="18" ry="18" width="340" height="180" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="24" y="40" fill="#fcd34d" font-size="24" font-family="Arial, sans-serif" font-weight="700">Runtime Surface</text>
    <text x="24" y="82" fill="#e2e8f0" font-size="19" font-family="Arial, sans-serif">Core / Fusion / Platform</text>
    <text x="24" y="116" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif">실행 표면을 먼저 고르고</text>
    <text x="24" y="144" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif">그다음 기능 가용성을 본다</text>
  </g>

  <g transform="translate(870,410)">
    <rect x="0" y="0" rx="18" ry="18" width="340" height="180" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="24" y="40" fill="#c4b5fd" font-size="24" font-family="Arial, sans-serif" font-weight="700">Reuse vs API</text>
    <text x="24" y="82" fill="#e2e8f0" font-size="19" font-family="Arial, sans-serif">package vs project dependency</text>
    <text x="24" y="116" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif">코드 재사용인지,</text>
    <text x="24" y="144" fill="#cbd5e1" font-size="17" font-family="Arial, sans-serif">공개 모델 API인지 구분</text>
  </g>
</svg>
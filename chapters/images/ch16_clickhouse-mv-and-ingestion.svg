<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<rect width="1200" height="760" fill="#f8fafc"/>
<text x="60" y="70" font-family="Arial, sans-serif" font-size="34" fill="#0f172a" font-weight="700">ClickHouse Materialized View 운영 시 꼭 알아야 할 흐름</text>

<rect x="80" y="150" width="220" height="110" rx="18" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="3"/>
<text x="110" y="205" font-family="Arial, sans-serif" font-size="28" fill="#0c4a6e" font-weight="700">source insert</text>
<text x="110" y="235" font-family="Arial, sans-serif" font-size="20" fill="#0c4a6e">raw events 계속 유입</text>

<rect x="380" y="150" width="250" height="110" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
<text x="420" y="205" font-family="Arial, sans-serif" font-size="28" fill="#14532d" font-weight="700">materialized view</text>
<text x="420" y="235" font-family="Arial, sans-serif" font-size="20" fill="#14532d">insert trigger처럼 동작</text>

<rect x="720" y="150" width="320" height="110" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
<text x="760" y="205" font-family="Arial, sans-serif" font-size="28" fill="#78350f" font-weight="700">target table</text>
<text x="760" y="235" font-family="Arial, sans-serif" font-size="20" fill="#78350f">daily aggregate / serving surface</text>

<line x1="300" y1="205" x2="380" y2="205" stroke="#64748b" stroke-width="5"/>
<polygon points="380,205 358,193 358,217" fill="#64748b"/>
<line x1="630" y1="205" x2="720" y2="205" stroke="#64748b" stroke-width="5"/>
<polygon points="720,205 698,193 698,217" fill="#64748b"/>

<rect x="120" y="360" width="420" height="260" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="150" y="410" font-family="Arial, sans-serif" font-size="30" fill="#0f172a" font-weight="700">정상 운영</text>
<text x="150" y="455" font-family="Arial, sans-serif" font-size="22" fill="#334155">• 새 insert가 들어올 때마다 target으로 반영</text>
<text x="150" y="495" font-family="Arial, sans-serif" font-size="22" fill="#334155">• subsequent dbt run은 ALTER/MODIFY 중심</text>
<text x="150" y="535" font-family="Arial, sans-serif" font-size="22" fill="#334155">• explicit target이면 운영 제어력이 커짐</text>

<rect x="640" y="360" width="440" height="260" rx="22" fill="#fff1f2" stroke="#ef4444" stroke-width="3"/>
<text x="670" y="410" font-family="Arial, sans-serif" font-size="30" fill="#7f1d1d" font-weight="700">full refresh / 재생성 시 주의</text>
<text x="670" y="455" font-family="Arial, sans-serif" font-size="22" fill="#7f1d1d">• MV가 drop/recreate되는 blind window 가능</text>
<text x="670" y="495" font-family="Arial, sans-serif" font-size="22" fill="#7f1d1d">• catchup과 live insert가 겹치면 duplicate 위험</text>
<text x="670" y="535" font-family="Arial, sans-serif" font-size="22" fill="#7f1d1d">• target이 잠시 empty / partial state가 될 수 있음</text>
<text x="670" y="575" font-family="Arial, sans-serif" font-size="22" fill="#7f1d1d">• active ingestion 중 full refresh는 계획적으로 수행</text>
</svg>
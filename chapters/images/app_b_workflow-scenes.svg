<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780">
<rect width="1280" height="780" fill="#0b1020"/>
<text x="70" y="80" fill="#f8fafc" font-size="34" font-family="Arial, sans-serif" font-weight="700">Workflow Scenes</text>
<text x="70" y="115" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">설치, 개발, CI, 복구 장면별로 기억하는 dbt 명령 루프</text>

<rect x="70" y="160" width="250" height="220" rx="18" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
<text x="95" y="205" fill="#e0f2fe" font-size="26" font-weight="700" font-family="Arial, sans-serif">첫 실행</text>
<text x="95" y="250" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">1. dbt --version</text>
<text x="95" y="285" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">2. dbt debug</text>
<text x="95" y="320" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">3. dbt parse</text>

<rect x="370" y="160" width="250" height="220" rx="18" fill="#111827" stroke="#22c55e" stroke-width="2"/>
<text x="395" y="205" fill="#dcfce7" font-size="26" font-weight="700" font-family="Arial, sans-serif">개발 루프</text>
<text x="395" y="250" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">1. dbt ls -s ...</text>
<text x="395" y="285" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">2. dbt compile -s ...</text>
<text x="395" y="320" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">3. dbt build -s model+</text>

<rect x="670" y="160" width="250" height="220" rx="18" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
<text x="695" y="205" fill="#fef3c7" font-size="26" font-weight="700" font-family="Arial, sans-serif">CI 루프</text>
<text x="695" y="250" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">1. dbt parse</text>
<text x="695" y="285" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">2. dbt ls -s state:modified+</text>
<text x="695" y="320" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">3. dbt build ... --defer</text>

<rect x="970" y="160" width="250" height="220" rx="18" fill="#111827" stroke="#ef4444" stroke-width="2"/>
<text x="995" y="205" fill="#fee2e2" font-size="26" font-weight="700" font-family="Arial, sans-serif">복구 루프</text>
<text x="995" y="250" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">1. dbt compile -s ...</text>
<text x="995" y="285" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">2. run_results 확인</text>
<text x="995" y="320" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">3. dbt retry</text>

<path d="M320 270 L370 270" stroke="#cbd5e1" stroke-width="4" marker-end="url(#arrow)"/>
<path d="M620 270 L670 270" stroke="#cbd5e1" stroke-width="4" marker-end="url(#arrow)"/>
<path d="M920 270 L970 270" stroke="#cbd5e1" stroke-width="4" marker-end="url(#arrow)"/>

<rect x="120" y="470" width="1040" height="180" rx="18" fill="#0f172a" stroke="#334155" stroke-width="2"/>
<text x="160" y="530" fill="#f8fafc" font-size="24" font-family="Arial, sans-serif" font-weight="700">핵심 기억법</text>
<text x="160" y="575" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">관찰 없이 실행하지 말고, 범위를 보지 않고 build하지 말고, 실패했다고 전체를 다시 돌리지 말자.</text>
<text x="160" y="615" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">debug → parse → ls → compile → build / source freshness / retry</text>

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L8,3 z" fill="#cbd5e1"/>
  </marker>
</defs>
</svg>
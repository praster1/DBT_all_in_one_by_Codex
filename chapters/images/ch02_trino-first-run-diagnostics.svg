<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
<rect width="1200" height="700" fill="#0b1220"/>
<text x="70" y="70" font-family="Arial, sans-serif" font-size="30" fill="#f8fafc" font-weight="700">Trino first-run diagnostics</text>
<text x="70" y="110" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">dbt profile → Trino service → catalog/schema → model execution 순서로 문제를 좁힌다</text>
<rect x="70" y="170" rx="18" ry="18" width="240" height="120" fill="#1d4ed8"/>
<text x="95" y="220" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="700">1. dbt profile</text>
<text x="95" y="255" font-family="Arial, sans-serif" font-size="18" fill="#dbeafe">type / host / port</text>
<text x="95" y="282" font-family="Arial, sans-serif" font-size="18" fill="#dbeafe">catalog / schema / threads</text>

<rect x="360" y="170" rx="18" ry="18" width="240" height="120" fill="#0f766e"/>
<text x="385" y="220" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="700">2. Trino service</text>
<text x="385" y="255" font-family="Arial, sans-serif" font-size="18" fill="#ccfbf1">coordinator / launcher</text>
<text x="385" y="282" font-family="Arial, sans-serif" font-size="18" fill="#ccfbf1">PID / permission / port</text>

<rect x="650" y="170" rx="18" ry="18" width="240" height="120" fill="#7c3aed"/>
<text x="675" y="220" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="700">3. Catalog / schema</text>
<text x="675" y="255" font-family="Arial, sans-serif" font-size="18" fill="#ede9fe">iceberg.sample_db</text>
<text x="675" y="282" font-family="Arial, sans-serif" font-size="18" fill="#ede9fe">write-capable target</text>

<rect x="940" y="170" rx="18" ry="18" width="190" height="120" fill="#b45309"/>
<text x="965" y="220" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="700">4. Models</text>
<text x="965" y="255" font-family="Arial, sans-serif" font-size="18" fill="#ffedd5">source / ref / merge</text>
<text x="965" y="282" font-family="Arial, sans-serif" font-size="18" fill="#ffedd5">tests / hooks / docs</text>

<path d="M310 230 L360 230" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
<path d="M600 230 L650 230" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
<path d="M890 230 L940 230" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

<rect x="90" y="390" rx="20" ry="20" width="1020" height="190" fill="#111827" stroke="#334155" stroke-width="2"/>
<text x="120" y="435" font-family="Arial, sans-serif" font-size="24" fill="#f8fafc" font-weight="700">대표 증상과 1차 분류</text>
<text x="120" y="480" font-family="Arial, sans-serif" font-size="20" fill="#e2e8f0">• Connection refused → SQL보다 coordinator / launcher / port부터 확인</text>
<text x="120" y="515" font-family="Arial, sans-serif" font-size="20" fill="#e2e8f0">• catalog not found / schema not found → connector / catalog 설정과 권한 확인</text>
<text x="120" y="550" font-family="Arial, sans-serif" font-size="20" fill="#e2e8f0">• dbt_internal_source.id / dest.id 오류 → merge unique_key 계약과 target schema 확인</text>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<polygon points="0 0, 10 3, 0 6" fill="#94a3b8"/>
</marker>
</defs>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
      <rect width="1200" height="760" fill="#f7f7fb"/>
      <text x="60" y="70" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#18212f">Governance Layers for Public dbt Models</text>
      <text x="60" y="105" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#49566a">Tests, contracts, access, versions, grants, and metadata are different layers of trust.</text>

      <rect x="100" y="160" rx="20" ry="20" width="1000" height="90" fill="#dfe8ff" stroke="#7f95d1" stroke-width="2"/>
      <text x="600" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#18212f">Observation Layer</text>
      <text x="600" y="232" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#28374b">Data tests · store_failures · severity · monitoring selectors</text>

      <rect x="150" y="275" rx="20" ry="20" width="900" height="90" fill="#e9f7ea" stroke="#79a97f" stroke-width="2"/>
      <text x="600" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#18212f">Schema Promise Layer</text>
      <text x="600" y="347" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#28374b">Contracts · constraints · stable columns · predictable shape</text>

      <rect x="200" y="390" rx="20" ry="20" width="800" height="90" fill="#fff2d7" stroke="#cfaf68" stroke-width="2"/>
      <text x="600" y="435" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#18212f">Sharing Boundary Layer</text>
      <text x="600" y="462" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#28374b">Access · groups · versions · deprecation plans · ref safety</text>

      <rect x="250" y="505" rx="20" ry="20" width="700" height="90" fill="#fbe0eb" stroke="#c97e9f" stroke-width="2"/>
      <text x="600" y="550" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#18212f">Delivery Layer</text>
      <text x="600" y="577" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#28374b">Grants · docs persistence · meta · query comments · ownership signals</text>

      <line x1="600" y1="250" x2="600" y2="275" stroke="#7a8190" stroke-width="3"/>
      <line x1="600" y1="365" x2="600" y2="390" stroke="#7a8190" stroke-width="3"/>
      <line x1="600" y1="480" x2="600" y2="505" stroke="#7a8190" stroke-width="3"/>

      <rect x="60" y="640" rx="12" ry="12" width="1080" height="70" fill="#ffffff" stroke="#d0d5dd"/>
      <text x="85" y="684" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#28374b">Rule of thumb: apply the strongest governance first to public marts, semantic inputs, and models consumed by other teams.</text>
    </svg>
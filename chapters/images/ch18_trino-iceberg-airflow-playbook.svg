<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<rect width="1200" height="760" fill="#0f172a"/>
<text x="70" y="70" font-family="Arial, sans-serif" font-size="30" fill="#f8fafc" font-weight="700">Trino + Iceberg + Airflow playbook</text>
<text x="70" y="110" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">source catalog, target catalog, orchestration run, dbt hooks를 하나의 운영 표면으로 묶는다</text>

<rect x="80" y="170" rx="18" ry="18" width="260" height="130" fill="#1d4ed8"/>
<text x="110" y="220" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="700">Airflow</text>
<text x="110" y="255" font-family="Arial, sans-serif" font-size="18" fill="#dbeafe">run_id / from_dt / end_dt</text>

<rect x="470" y="170" rx="18" ry="18" width="260" height="130" fill="#0f766e"/>
<text x="500" y="220" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="700">dbt + hooks</text>
<text x="500" y="255" font-family="Arial, sans-serif" font-size="18" fill="#ccfbf1">pre_hook / on-run-end / logs</text>

<rect x="860" y="170" rx="18" ry="18" width="260" height="130" fill="#7c3aed"/>
<text x="890" y="220" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="700">Trino + Iceberg</text>
<text x="890" y="255" font-family="Arial, sans-serif" font-size="18" fill="#ede9fe">catalog / schema / merge / write</text>

<path d="M340 235 L470 235" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
<path d="M730 235 L860 235" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

<rect x="100" y="390" rx="22" ry="22" width="1000" height="230" fill="#111827" stroke="#334155" stroke-width="2"/>
<text x="130" y="440" font-family="Arial, sans-serif" font-size="24" fill="#f8fafc" font-weight="700">핵심 운영 체크포인트</text>
<text x="130" y="485" font-family="Arial, sans-serif" font-size="20" fill="#e2e8f0">• source는 sources.yml로 catalog/schema/table 계약을 먼저 만든다.</text>
<text x="130" y="520" font-family="Arial, sans-serif" font-size="20" fill="#e2e8f0">• merge incremental은 source와 target 양쪽에 unique_key가 실제 컬럼으로 존재해야 한다.</text>
<text x="130" y="555" font-family="Arial, sans-serif" font-size="20" fill="#e2e8f0">• logging macro는 run_id와 기간 파라미터를 함께 기록해 orchestration과 연결한다.</text>
<text x="130" y="590" font-family="Arial, sans-serif" font-size="20" fill="#e2e8f0">• connection refused는 model이 아니라 coordinator / launcher / 권한부터 본다.</text>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<polygon points="0 0, 10 3, 0 6" fill="#94a3b8"/>
</marker>
</defs>
</svg>
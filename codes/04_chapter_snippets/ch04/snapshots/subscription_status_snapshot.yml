version: 2

snapshots:
  - name: subscription_status_snapshot
    relation: ref('stg_subscriptions')
    description: "구독 상태 변화 이력을 저장한다"
    config:
      strategy: timestamp
      unique_key: subscription_id
      updated_at: updated_at
      target_schema: snapshots
    columns:
      - name: subscription_id
        data_tests: [not_null]

semantic_models:
  - name: orders_semantic
    model: ref('fct_orders')
    defaults:
      agg_time_dimension: order_date
    entities:
      - name: order
        type: primary
        expr: order_id
      - name: customer
        type: foreign
        expr: customer_id
    dimensions:
      - name: order_date
        type: time
        type_params:
          time_granularity: day
      - name: customer_segment
        type: categorical
    measures:
      - name: gross_revenue
        agg: sum
        expr: gross_revenue

  - name: mrr_semantic
    model: ref('fct_mrr')
    entities:
      - name: plan
        type: foreign
        expr: plan_id
    dimensions:
      - name: plan_id
        type: categorical
    measures:
      - name: mrr
        agg: sum
        expr: mrr

metrics:
  - name: revenue
    label: Revenue
    type: simple
    type_params:
      measure: gross_revenue

  - name: mrr
    label: MRR
    type: simple
    type_params:
      measure: mrr
